<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM文本审核 - 防返贫风险线索文本生成工具</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hidden-section { display: none; }
    .loading-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #8b5cf6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- 顶部标题栏 -->
  <header class="text-white p-4 shadow-lg" style="background: linear-gradient(to right, #7C3AED 0%, #8B5CF6 50%, #A78BFA 100%);">
    <div class="flex items-center justify-center gap-3">
      <div class="text-3xl">🤖</div>
      <div>
        <h1 class="text-xl font-bold text-center">LLM文本审核</h1>
        <p class="text-sm text-purple-100 text-center mt-1">防返贫风险线索文本生成工具</p>
      </div>
    </div>
  </header>

  <main class="p-4 max-w-6xl mx-auto">

    <!-- 原文本显示区 -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-4">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-lg font-bold text-gray-800">📝 待审核文本</h2>
        <div class="flex gap-2">
          <button onclick="clearText()" class="text-xs bg-gray-500 hover:bg-gray-600 text-white px-3 py-1 rounded-lg">清空</button>
          <button onclick="copyOriginal()" class="text-xs bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded-lg">复制</button>
        </div>
      </div>
      <div id="originalSection" class="bg-blue-50 border-2 border-blue-300 rounded-lg p-4 mb-4">
        <p class="text-sm text-blue-600 mb-2" id="riskTypeLabel">风险类型：未指定（可手动输入）</p>
        <textarea
          id="originalText"
          class="w-full h-48 px-3 py-2 border-2 border-blue-200 rounded-lg text-sm resize-none bg-white"
          placeholder="请在此粘贴需要审核的文本..."
        ></textarea>
      </div>
    </div>

    <!-- 审核状态区 -->
    <div id="reviewStatusSection" class="bg-white rounded-xl shadow-md p-4 mb-4">
      <div id="statusPending" class="text-center py-8">
        <div class="text-6xl mb-4">🔍</div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">准备开始LLM审核</h3>
        <p class="text-gray-600 mb-4">点击下方按钮开始审核</p>
        <button
          onclick="startReview()"
          class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-4 rounded-xl text-xl font-bold shadow-md transition-colors"
        >
          🤖 开始LLM审核
        </button>
      </div>

      <div id="statusLoading" class="text-center py-8 hidden-section">
        <div class="loading-spinner mx-auto mb-4"></div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">LLM审核中...</h3>
        <p class="text-gray-600" id="loadingMessage">正在调用百炼API，请稍候</p>
      </div>

      <div id="statusError" class="text-center py-8 hidden-section">
        <div class="text-6xl mb-4">❌</div>
        <h3 class="text-xl font-bold text-red-800 mb-2">审核失败</h3>
        <p class="text-gray-600 mb-4" id="errorMessage">错误信息</p>
        <button
          onclick="startReview()"
          class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-4 rounded-xl text-xl font-bold shadow-md transition-colors"
        >
          🔄 重试
        </button>
      </div>
    </div>

    <!-- 审核结果对比区 -->
    <div id="compareSection" class="bg-white rounded-xl shadow-md p-4 mb-4 hidden-section">
      <h2 class="text-lg font-bold text-gray-800 mb-4">🔍 LLM合规审核结果</h2>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
        <!-- 原文本 -->
        <div>
          <h3 class="font-semibold text-gray-700 mb-2 flex items-center gap-2">
            <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-sm">待审文本</span>
          </h3>
          <textarea
            id="compareOriginal"
            class="w-full h-64 px-3 py-2 border-2 border-blue-300 rounded-lg text-sm resize-none bg-blue-50"
            readonly
          ></textarea>
        </div>
        <!-- 审核意见 -->
        <div>
          <h3 class="font-semibold text-gray-700 mb-2 flex items-center gap-2">
            <span id="reviewResultBadge" class="bg-purple-100 text-purple-700 px-2 py-1 rounded text-sm">审核意见</span>
          </h3>
          <textarea
            id="compareLLM"
            class="w-full h-64 px-3 py-2 border-2 border-purple-300 rounded-lg text-sm resize-none bg-purple-50"
            readonly
          ></textarea>
        </div>
      </div>

      <!-- 缺陷列表 -->
      <div id="issuesSection" class="bg-red-50 border border-red-300 rounded-lg p-4 mb-4 hidden-section">
        <h3 class="font-semibold text-red-800 mb-2">⚠️ 发现的缺陷</h3>
        <ul id="issuesList" class="list-disc list-inside text-sm text-red-700 space-y-2"></ul>
      </div>

      <!-- 审核说明 -->
      <div id="passSection" class="bg-green-50 border border-green-300 rounded-lg p-4 mb-4 hidden-section">
        <div class="flex items-center gap-3">
          <span class="text-4xl">✅</span>
          <div>
            <h3 class="font-semibold text-green-800">合规通过</h3>
            <p class="text-sm text-green-700">未发现违规问题</p>
          </div>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="flex flex-col sm:flex-row gap-3">
        <button
          onclick="copyReviewResult()"
          class="flex-1 bg-purple-600 hover:bg-purple-700 text-white px-6 py-4 rounded-xl text-lg font-bold shadow-md transition-colors"
        >
          📋 复制审核结果
        </button>
        <button
          onclick="goBack()"
          class="flex-1 bg-gray-600 hover:bg-gray-700 text-white px-6 py-4 rounded-xl text-lg font-bold shadow-md transition-colors"
        >
          ← 返回生成页面
        </button>
      </div>
    </div>

    <!-- 返回按钮 -->
    <div class="text-center mt-6 hidden-section" id="extraBackButton">
      <button
        onclick="goBack()"
        class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-xl font-semibold shadow-md transition-colors"
      >
        ← 返回生成页面
      </button>
    </div>
  </main>

  <script>
    // 从URL参数获取数据
    const urlParams = new URLSearchParams(window.location.search);
    const originalText = urlParams.get('text') || '';
    const riskType = urlParams.get('riskType') || '';
    const riskTypeNames = {
      'medical': '医疗支出类',
      'lowIncome': '新增低保类',
      'housing': '住房安全类',
      'disability': '新增残疾类'
    };

    // 全局变量
    let llmResultText = '';
    let apiKey = (window.LLM_CONFIG && window.LLM_CONFIG.apiKey) || localStorage.getItem('llm_api_key') || '';

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 如果有URL参数，显示风险类型和文本
      if (riskType) {
        document.getElementById('riskTypeLabel').textContent = '风险类型：' + (riskTypeNames[riskType] || '未知');
        const decodedText = decodeURIComponent(originalText);
        document.getElementById('originalText').value = decodedText;
        document.getElementById('compareOriginal').value = decodedText;
      }
    });

    // 返回生成页面
    function goBack() {
      const originalWin = window.opener;
      if (originalWin) {
        // 将结果返回给父窗口
        originalWin.postMessage({
          type: 'llmResult',
          llmText: llmResultText,
          used: false
        }, '*');
        window.close();
      } else {
        window.location.href = 'index.html';
      }
    }

    // 复制待审文本
    function copyOriginal() {
      const text = document.getElementById('originalText').value;
      if (!text) {
        alert('请先输入待审核文本！');
        return;
      }
      navigator.clipboard.writeText(text).then(function() {
        alert('✅ 待审文本已复制！');
      }).catch(function() {
        alert('❌ 复制失败');
      });
    }

    // 清空文本
    function clearText() {
      document.getElementById('originalText').value = '';
      document.getElementById('originalText').focus();
    }

    // 复制审核结果
    function copyReviewResult() {
      const originalText = document.getElementById('compareOriginal').value;
      const reviewResult = document.getElementById('compareLLM').value;
      const issues = document.getElementById('issuesList').innerHTML;

      let text = '【待审文本】\n' + originalText + '\n\n【LLM审核结果】\n' + reviewResult;

      if (issues && issues.trim()) {
        text += '\n\n【发现的缺陷】\n' + issues.replace(/<[^>]+>/g, '');
      }

      navigator.clipboard.writeText(text).then(function() {
        alert('✅ 审核结果已复制！');
      }).catch(function() {
        alert('❌ 复制失败');
      });
    }

    // 开始审核
    function startReview() {
      const inputText = document.getElementById('originalText').value.trim();

      if (!inputText) {
        alert('请先输入或粘贴待审核文本！');
        document.getElementById('originalText').focus();
        return;
      }

      if (!apiKey) {
        apiKey = prompt('请输入您的百炼平台API Key：');
        if (!apiKey) {
          return;
        }
        localStorage.setItem('llm_api_key', apiKey);
      }

      showStatus('loading');
      llmResultText = '';

      const promptText = `你是省级平台合规审核引擎。你的唯一任务是对照提供的【判定标准】，审查【待审文本】是否违规。严禁直接重写文本，严禁输出任何问候语或解释。

【判定标准】

1. 问题类型1：疑似应纳未纳
判定标准：人均纯收入 < 监测线10000元。
排除条件（若满足以下任一，则不填此类型）：整户死亡。直系亲属是财政供养人员（公务员、医生等）且非共同生活子女条件较好。

2. 问题类型2：纳入不及时
判定标准：针对已判定为类型1的户，自线索核查时间起超2个月未纳入或始终未纳入。

3. 问题类型3：政策不熟悉
判定标准：出现以下任一情况：
- 提到存款支付但未写明具体金额
- 将预期性收入计入总收入
- 提到"县级/市级推送"、"高于某年监测标准"（无具体年份不算）、"具体收入周期"、"之前消除风险/重复推送/慎重纳入/农村自建房"等表述
- 合规支出由家庭支出或本人支出

4. 问题类型4：疑似核实情况作假
判定标准：
- 非共同生活成员赡养费 > 20000元且计入总收入（未标注"非共同生活"即视为作假）
- 不同户的核实情况重复率过高（除名字外雷同）

5. 问题类型5：风险线索核实超时
判定标准：核实情况中出现超前预知（如线索核查时间早于事件发生时间）

6. 问题类型6：核实情况不完整
判定标准：
- 成员死亡户未明确是否单人户
- 丧失劳动力或生病后未核实照料需求或病情状态

7. 问题类型7：核实情况标注不准确
判定标准：
- "是否无法联系"选"否"但填"无法取得联系"，选"是"却填入户或电话核查
- 已退出监测户有返贫线索且无法联系未规范标注

8. 问题类型8：核实情况与预警信息不匹配
判定标准：
- 残疾类型不一致
- 医保自付金额与核查情况不一致

9. 问题类型9：核实结论依据不足
判定标准：
- 家庭情况、收支模糊，无法核算人均可支配收入
- 结论无有效依据

10. 问题类型10：核实情况逻辑不严谨
判定标准：
- 数据矛盾（如人均总收入 > 家庭总收入）
- 内容表述冲突或违背常识（如教育支出=0但有学费支出）

【负面清单预检】
全局扫描违禁词：若文本包含"市级推送"、"慎重纳入"、"之前消除风险"，直接判定为【问题类型3：政策不熟悉】并标红。

【待审文本】
${inputText}

【输出强制模板】
如果完全合规，只能输出：[PASS]
如果发现违规，必须按此格式输出：
缺陷类型：类型X-XXX
原句：XXX
违规原因：XXX`;

      callLLMAPI(apiKey, promptText);
    }

    // 调用百炼API
    function callLLMAPI(apiKey, prompt) {
      const config = window.LLM_CONFIG || {};
      const url = config.apiUrl || 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
      const model = config.model || 'qwen-plus';
      const temperature = config.temperature || 0.7;

      const requestData = {
        model: model,
        messages: [
          {
            role: 'user',
            content: prompt
          }
        ],
        temperature: temperature
      };

      fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify(requestData)
      })
      .then(function(response) {
        if (!response.ok) {
          throw new Error('API请求失败：' + response.status);
        }
        return response.json();
      })
      .then(function(data) {
        if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
          llmResultText = data.choices[0].message.content.trim();
          showResult(llmResultText);
        } else if (data.error) {
          throw new Error(data.error.message || 'API返回错误');
        } else {
          throw new Error('无法解析API返回结果');
        }
      })
      .catch(function(err) {
        showStatus('error');
        document.getElementById('errorMessage').textContent = err.message || '网络错误';
      });
    }

    // 显示状态
    function showStatus(status) {
      document.getElementById('statusPending').classList.add('hidden-section');
      document.getElementById('statusLoading').classList.add('hidden-section');
      document.getElementById('statusError').classList.add('hidden-section');
      document.getElementById('compareSection').classList.add('hidden-section');

      if (status === 'pending') {
        document.getElementById('statusPending').classList.remove('hidden-section');
      } else if (status === 'loading') {
        document.getElementById('statusLoading').classList.remove('hidden-section');
      } else if (status === 'error') {
        document.getElementById('statusError').classList.remove('hidden-section');
      } else if (status === 'result') {
        document.getElementById('compareSection').classList.remove('hidden-section');
      }
    }

    // 显示结果
    function showResult(llmText) {
      document.getElementById('compareLLM').value = llmText;

      // 解析合规审查结果
      const issuesSection = document.getElementById('issuesSection');
      const passSection = document.getElementById('passSection');
      const issuesList = document.getElementById('issuesList');
      const reviewBadge = document.getElementById('reviewResultBadge');

      issuesSection.classList.add('hidden-section');
      passSection.classList.add('hidden-section');
      issuesList.innerHTML = '';

      if (llmText.includes('[PASS]') || llmText.includes('PASS')) {
        // 合规通过
        reviewBadge.textContent = '合规通过';
        reviewBadge.className = 'bg-green-100 text-green-700 px-2 py-1 rounded text-sm';
        reviewBadge.classList.remove('bg-purple-100', 'text-purple-700');
        reviewBadge.classList.add('bg-green-100', 'text-green-700');
        passSection.classList.remove('hidden-section');
      } else {
        // 发现违规
        reviewBadge.textContent = '发现违规';
        reviewBadge.classList.remove('bg-purple-100', 'text-purple-700', 'bg-green-100', 'text-green-700');
        reviewBadge.classList.add('bg-red-100', 'text-red-700');
        issuesSection.classList.remove('hidden-section');

        // 解析缺陷列表
        const issues = parseIssues(llmText);
        issues.forEach(function(issue) {
          const li = document.createElement('li');
          li.innerHTML = '<strong>' + issue.type + '</strong><br>原句：' + issue.original + '<br>原因：' + issue.reason;
          issuesList.appendChild(li);
        });
      }

      showStatus('result');
    }

    // 解析缺陷
    function parseIssues(text) {
      const issues = [];
      const lines = text.split('\n');

      let currentIssue = null;

      lines.forEach(function(line) {
        line = line.trim();

        if (line.includes('缺陷类型：') || line.includes('问题类型')) {
          if (currentIssue) {
            issues.push(currentIssue);
          }
          currentIssue = {
            type: line.replace('缺陷类型：', '').replace('问题类型', '问题类型'),
            original: '',
            reason: ''
          };
        } else if (line.includes('原句：') && currentIssue) {
          currentIssue.original = line.replace('原句：', '');
        } else if (line.includes('违规原因：') && currentIssue) {
          currentIssue.reason = line.replace('违规原因：', '');
        }
      });

      if (currentIssue) {
        issues.push(currentIssue);
      }

      return issues;
    }

    // 审核完成后返回（仅标记已审核）
    function markAsReviewed() {
      const originalWin = window.opener;
      if (originalWin) {
        originalWin.postMessage({
          type: 'llmReviewComplete',
          reviewed: true
        }, '*');
        window.close();
      } else {
        alert('已记录审核状态');
      }
    }

    // 监听来自父窗口的消息
    window.addEventListener('message', function(event) {
      console.log('Received message:', event.data);
    });
  </script>
</body>
</html>
